<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        Name: <input type="text" name="name" id="name" placeholder="Enter your name" maxlength="5"><br><br>
        Email: <input type="email" name="email" placeholder="your email"><br><br>
        <Address>Address: <input type="text" name="address" placeholder="Enter your address"></Address><br><br>
        Password: <input type="password" name="password" value="password"required minlength="3"><br><br>
        Date of Birth: <input type="date" name="dob" placeholder="dob " required><br><br>
         Search : <input type="search" name="search"><br><br>
         photo : <input type="file" name="photo" accept="multiple"><br>
         audio: <input type="file" name="audio" accept="audio/*"><br>
         Mobile: <input type="tel" name="mobile" pattern="[0-9]{10}" placeholder="Enter 10 digit mobile number"><br><br>
         website:<input type="url" name="website" placeholder="Enter your website"><br><br> 
         Country:<input type="text" name="country" list="countries" placeholder="Select your country">
        <label for="Gender">
            Gender:
            <input type="radio" name="gender" value="male">
            <input type="radio" name="gender" value="female">
        </label>

     
           <input type="submit" value="Submit">
           <button type="button">Click Me</button>
           <button type="reset">Reset</button>
           <button type="cancel">Cancel </button>
    </form>
    <style>
        form{
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
    
</body>
</html>
