<!DOCTYPE html>
<html>
<head>
    <title>CSS Position</title>

    <style>

    div{
        border:2px solid black;
        position:fixed;
        width:300px;
        padding:10px;
    }

    #p1{
        position:relative;
        font-family:Arial;
        color:green;
    }

    #p2{
        position:absolute;
        top:0px;
        left:200px;
    }

    </style>

</head>

<body>

<div>

<h2>Student Information</h2>

<p id="p1">
This is paragraph P1.
</p>

<p id="p2">
This is paragraph P2.
</p>

</div>

</body>
</html>
